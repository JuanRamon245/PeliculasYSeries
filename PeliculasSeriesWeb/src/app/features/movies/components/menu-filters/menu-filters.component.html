<!-- Wrapper full-width que centra el menú -->
<div class="wrapperFiltro">
    <div class="margen">

        <div class="contenedor">

            <!-- Cabecera toggle -->
            <div class="cabecera" [class.expandida]="abierto()" (click)="toggleMenu()">
                <div class="nombre letraGrande"><p>Filtros</p></div>
                <div class="decoracion">
                    <div class="icono" [class.abierto]="abierto()">
                        <span class="material-symbols-outlined">expand_more</span>
                    </div>
                </div>
            </div>

            <!-- Cuerpo absolute desplegable -->
            @if (abierto()) {
                <div class="cuerpo">

                    <div class="horizontal margenArriba">
                        <div class="titulo letraGrande"><p>Ordenar</p></div>
                        <div class="contenedorDatos">
                            <select [(ngModel)]="orden" class="input-form letraPequeña">
                                <option value="az">Nombre A–Z</option>
                                <option value="za">Nombre Z–A</option>
                                <option value="fecha_ultima">Más reciente</option>
                                <option value="fecha_primera">Más antiguo</option>
                            </select>
                        </div>
                    </div>

                    <div class="titulo letraGrande"><p>Género</p></div>
                    <div class="contenedorDatosGeneros">
                        <div class="generosFiltro letraPequeña">
                            @for (g of generosService.genres(); track g.nombre) {
                                <div
                                    class="contenedorTiposEstados"
                                    [class.activo]="isGeneroActive(g.nombre)"
                                    (click)="toggleGenero(g.nombre)">
                                    <p>{{ g.nombre }}</p>
                                </div>
                            }
                            @if (generosService.genres().length === 0) {
                                <p class="sinGeneros">Sin géneros</p>
                            }
                        </div>
                    </div>

                    <div class="nombre letraGrande margenAbajo"><p>Tipo</p></div>
                    <div class="tipo">
                        <div class="contenedorTiposEstados letraPequeña" [class.activo]="isAnimacionActive('Normal')" (click)="toggleAnimacion('Normal')"><p>Normal</p></div>
                        <div class="contenedorTiposEstados letraPequeña" [class.activo]="isAnimacionActive('Anime')"  (click)="toggleAnimacion('Anime')"><p>Anime</p></div>
                        <div class="contenedorTiposEstados letraPequeña" [class.activo]="isFormatoActive('Pelicula')" (click)="toggleFormato('Pelicula')"><p>Película</p></div>
                        <div class="contenedorTiposEstados letraPequeña" [class.activo]="isFormatoActive('Serie')"    (click)="toggleFormato('Serie')"><p>Serie</p></div>
                    </div>

                    <div class="nombre letraGrande margenAbajo"><p>Estado</p></div>
                    <div class="tipo estado">
                        <div class="contenedorTiposEstados letraPequeña" [class.activo]="isEstadoActive('No visto')"   (click)="toggleEstado('No visto')"><p>No visto</p></div>
                        <div class="contenedorTiposEstados letraPequeña" [class.activo]="isEstadoActive('En proceso')" (click)="toggleEstado('En proceso')"><p>En proceso</p></div>
                        <div class="contenedorTiposEstados letraPequeña" [class.activo]="isEstadoActive('Visto')"      (click)="toggleEstado('Visto')"><p>Visto</p></div>
                    </div>

                    <div class="contenedorBoton">
                        <button class="botonPulsar" (click)="aplicar()">Buscar</button>
                    </div>

                </div>
            }

        </div><!-- /.contenedor -->
    </div><!-- /.margen -->
</div><!-- /.wrapperFiltro -->
