<div class="contenedor">
    <div class="cabecera">
        <div class="nombre"><p>{{ movie().nombre }}</p></div>
        <div class="decoracion">
            <!-- Iconos de acción — solo visibles si hay sesión iniciada -->
            @if (usuariosService.isLoggedIn()) {
                <div class="icono" (click)="editar()" title="Editar">
                    <span class="material-symbols-outlined">edit</span>
                </div>
                <div class="icono eliminar" (click)="eliminar()" title="Eliminar">
                    <span class="material-symbols-outlined">delete</span>
                </div>
            }
        </div>
    </div>

    <div class="cuerpo">
        <div class="datos">
            <div class="contenedorDatos">
                <div class="titulo letraGrande"><p>Género:</p></div>
                <div class="texto letraPequeña"><p>{{ movie().genero }}</p></div>
            </div>
            <div class="contenedorDatos">
                <div class="titulo letraGrande"><p>Fecha:</p></div>
                <div class="texto letraPequeña"><p>{{ fechaFormateada }}</p></div>
            </div>
            <div class="contenedorDatos">
                <div class="titulo letraGrande"><p>Estado:</p></div>
                <div class="texto letraPequeña"><p>{{ movie().estado }}</p></div>
            </div>
            <div class="contenedorDatos">
                <div class="titulo letraGrande"><p>Visto:</p></div>
                <div class="texto letraPequeña"><p>{{ vistoTexto }}</p></div>
            </div>
        </div>

        <div class="clasificacion">
            <div class="contenedorClasificacion letraGrande">
                <p>{{ tipoTexto }}</p>
            </div>
        </div>
    </div>

    <!-- Botón actualizar solo con sesión -->
    @if (usuariosService.isLoggedIn()) {
        <div class="pie">
            <div class="contenedorBoton">
                <button class="botonPulsar" (click)="editar()">Actualizar</button>
            </div>
        </div>
    }
</div>
