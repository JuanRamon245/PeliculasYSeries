<article class="contenedor" [class]="'cabecera-' + movie().tipo[1].toLowerCase()">
    <div class="cabecera">
        <div class="nombre txLarge txBold kosugiMPr">
            <p>{{ movie().tipo[1] }} · {{ movie().tipo[0] }}</p>
        </div>
        
        <div class="decoracion">
            @if (usuariosService.isLoggedIn()) {
                <span class="material-symbols-outlined icono editar" appClickEffectSimple (click)="editar()" title="Editar">edit</span>
                <span class="material-symbols-outlined icono eliminar" appClickEffectSimple (click)="eliminar()" title="Eliminar">delete</span>
            }
        </div>
    </div>

    <div class="cuerpo">
        <h2 class="tituloPelicula txRegular txBold gaeguPr">{{ movie().nombre }}</h2>

        <div class="datosGrid">
            <div class="datoBloque">
                <p class="tituloDato txBase txBold kosugiMPr">Genero</p>
                <span class="tagGenero txSmall txBold gaeguPr">{{ movie().genero }}</span>
            </div>
            
            <div class="datoBloque">
                <p class="tituloDato txBase txBold kosugiMPr">Visto</p>
                <p class="textoDatoDestacado txSmall txBold gaeguPr">{{ vistoTexto }}</p>
            </div>
        </div>

        <div class="separador"></div>

        <div class="estadoGrid">
            <div class="datoBloque">
                <p class="tituloDato txBase txBold kosugiMPr">Estado</p>
                <div class="estadoBadge">
                    <span class="puntoEstado" [class]="'punto-' + movie().estado.replace(' ', '-').toLowerCase()"></span>
                    <span class="textoDato txSmall gaeguPr">{{ movie().estado }}</span>
                </div>
            </div>
            
            <div class="datoBloque  text-right">
                <p class="tituloDato txBase txBold kosugiMPr">Fecha de creacion</p>
                <p class="textoDato txSmall gaeguPr">{{ fechaFormateada }}</p>
            </div>
        </div>
    </div>
</article>
