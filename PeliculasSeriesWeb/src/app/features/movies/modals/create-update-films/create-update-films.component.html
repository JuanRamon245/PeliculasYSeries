<div class="margen">
    <div class="contenedorDecoracionArriba">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="sombraPliegue" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="var(--marron)" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="var(--marron)" stop-opacity="0" />
                </linearGradient>
                <g id="hojaUnica">
                    <path d="M 10 10 
                            L 80 10 
                            L 90 20 
                            L 90 110 
                            L 10 110 
                            Z" 
                        fill="var(--blanco)" 
                        stroke="var(--marron)" 
                        stroke-width="3" 
                        stroke-linejoin="round" />

                    <path d="M 80 10 
                            L 90 20 
                            L 80 20 
                            Z" 
                        fill="var(--blanco)" 
                        stroke="var(--marron)" 
                        stroke-width="3" 
                        stroke-linejoin="round" />
                    
                    <line x1="80" y1="20" x2="80" y2="10" stroke="var(--marron)" stroke-width="3" />
                    <line x1="80" y1="20" x2="90" y2="20" stroke="var(--marron)" stroke-width="3" />
                    
                    <path d="M 80 20 L 90 20 L 80 10 Z" fill="url(#sombraPliegue)" stroke="none" transform="translate(1, 1)"/>
                </g>
            </defs>

            <use href="#hojaUnica" x="7.5" y="-7.5" />
        
            <use href="#hojaUnica" x="0" y="0" />
            
            <use href="#hojaUnica" x="-7.5" y="7.5" />

        </svg>
    </div>
    <div class="contenedor">
        <div class="cabecera">
            <div class="nombre txLarge txBold kosugiMPr"><p>{{ titulo }}</p></div>
            <div class="decoracion">
                <span class="material-symbols-outlined icono">remove</span>
                <span class="material-symbols-outlined icono">select_window</span>
                <span class="material-symbols-outlined icono eliminar" (click)="cerrar()">close</span>
            </div>
        </div>

        <div class="cuerpo">
            <div class="nombre txMedium txBold kosugiMPr"><p>Nombre</p></div>
            <div class="contenedorDatos">
                <input
                    type="text"
                    placeholder="Escribe el nombre..."
                    class="input-form txBase txRegular gaeguPr"
                    [(ngModel)]="nombre"
                    maxlength="40"
                />
            </div>

            <div class="nombre txMedium txBold kosugiMPr"><p>Tipo</p></div>
            <div class="tipo">
                <input type="radio" name="formato" id="normal" [checked]="formato === 'Normal'" hidden>
                <label for="normal" class="contenedorTiposEstados txBase txRegular gaeguPr" appClickEffectSimple (click)="formato = 'Normal'">Normal</label>

                <input type="radio" name="formato" id="anime" [checked]="formato === 'Anime'" hidden>
                <label for="anime" class="contenedorTiposEstados txBase txRegular gaeguPr" appClickEffectSimple (click)="formato = 'Anime'">Anime</label>

                <input type="radio" name="categoria" id="pelicula" [checked]="categoria === 'Pelicula'" hidden>
                <label for="pelicula" class="contenedorTiposEstados txBase txRegular gaeguPr" appClickEffectSimple (click)="categoria = 'Pelicula'">Pelicula</label>

                <input type="radio" name="categoria" id="serie" [checked]="categoria === 'Serie'" hidden>
                <label for="serie" class="contenedorTiposEstados txBase txRegular gaeguPr" appClickEffectSimple (click)="categoria = 'Serie'">Serie</label>
            </div>

            <div class="nombre txMedium txBold kosugiMPr"><p>Maximo</p></div>
            <div class="contenedorDatos">
                <input
                    type="text"
                    [placeholder]="maximoPlaceholder"
                    class="input-form txBaset xRegular gaeguPr"
                    [(ngModel)]="maximo"
                    maxlength="50"
                />
            </div>

            <div class="nombre txMedium txBold kosugiMPr"><p>Actual</p></div>
            <div class="contenedorDatos">
                <input
                    type="text"
                    [placeholder]="minimoPlaceholder"
                    class="input-form txBase txRegular gaeguPr"
                    [(ngModel)]="minimo"
                    maxlength="50"
                />
            </div>

            <div class="horizontal">
                <div class="titulo txMedium txBold kosugiMPr"><p>Genero</p></div>
                <div class="contenedorDatos txMedium custom-select-container">
                    <select class="input-form txBase txRegular gaeguPr" [(ngModel)]="genero">
                        @for (g of generosService.genres(); track g.nombre) {
                            <option [value]="g.nombre" appClickEffectSimple>{{ g.nombre }}</option>
                        }
                    </select>
                </div>
            </div>

            <div class="nombre txMedium txBold kosugiMPr"><p>Estado</p></div>
            <div class="tipo estado">
                @for (e of estadosDisponibles; track e) {
                    <input
                        type="radio"
                        name="estado"
                        [id]="'estado-' + e"
                        [checked]="estado === e"
                        hidden
                    />
                    <label
                        [for]="'estado-' + e"
                        class="contenedorTiposEstados txBase txRegular gaeguPr"
                        (click)="estado = e">
                        {{ e }}
                    </label>
                }
            </div>

        </div>

        <div class="pie">
            <div class="decoracionPie">
                <div class="inferior">
                    <span class="material-symbols-outlined icono">favorite</span>
                    <span class="material-symbols-outlined icono invertir">skip_previous</span>
                    <span class="material-symbols-outlined icono invertir">pause</span>
                    <span class="material-symbols-outlined icono invertir">skip_next</span>
                </div>
                <div class="superior">
                    <div class="barra"><div class="cantidad"></div></div>
                </div>
            </div>
            <div class="contenedorBoton">
                <button
                    class="botonPulsar txBase txBold latoPr"
                    (click)="guardar()"
                    appClickEffect
                    [disabled]="loading()">
                    Guardar
                </button>
            </div>
        </div>

    </div>
</div>
