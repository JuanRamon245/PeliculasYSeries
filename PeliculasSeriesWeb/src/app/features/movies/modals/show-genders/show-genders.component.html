<div class="margen">
    <div class="contenedorDecoracion">
        <svg width="100%" height="100%" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
            <style>
                .bocadillo-notificacion { fill: var(--blanco); stroke: var(--marron); stroke-width: 3px; }
                .carta-cuerpo { fill: var(--amarillo); stroke: var(--marron); stroke-width: 3px; }
                .carta-lineas { stroke: var(--marron); stroke-width: 3px; fill: none; }
            </style>

            <path class="bocadillo-notificacion" d="M15,5 H105 A5,5 0 0,1 110,10 V60 A5,5 0 0,1 105,65 H70 L60,75 L50,65 H15 A5,5 0 0,1 10,60 V10 A5,5 0 0,1 15,5 Z" stroke-linecap="round" stroke-linejoin="round"/>

            <rect class="carta-cuerpo" x="35" y="20" width="50" height="35" rx="2"/>
            <path class="carta-lineas" d="M35,20 L60,42 L85,20"/>
            <path class="carta-lineas" d="M35,55 L54,37"/>
            <path class="carta-lineas" d="M85,55 L65,37"/>
        </svg>
    </div>
    <div class="contenedor">
        <div class="cabecera">
            <div class="nombre letraGrande kosugiMPr"><p>Generos</p></div>
            <div class="decoracion">
                <span class="material-symbols-outlined icono">remove</span>
                <span class="material-symbols-outlined icono">select_window</span>
                <span class="material-symbols-outlined icono eliminar" (click)="cerrar()">close</span>
            </div>
        </div>

        <div class="cuerpo">
            @if (generosService.genres().length === 0) {
                <p class="sinGenero nombre letraPequeña gaeguPr">No hay géneros creados todavía.</p>
            }
            @else {
                <div class="generos">
                    @for (genero of generosService.genres(); track genero.nombre; let i = $index) {
                        <!-- El id debe ser único; usamos el índice para ello -->
                        <input
                            type="radio"
                            name="generoSeleccionado"
                            [id]="'genero-' + i"
                            [checked]="isSelected(genero.nombre)"
                            (change)="select(genero.nombre)"
                            hidden
                        />
                        <label
                            [for]="'genero-' + i"
                            class="contenedorGeneros letraPequeña gaeguPr"
                            [class.seleccionado]="isSelected(genero.nombre)">
                            {{ genero.nombre }}
                        </label>
                    }
                </div>
            }
            
        </div>

        <div class="pie">
            @if (usuariosService.isLoggedIn()) {
                <div class="contenedorBoton" (click)="eliminar()">
                    <button class="botonPulsar latoPr">Eliminar</button>
                </div>
                <div class="contenedorBoton contenedorBotonAncho" (click)="actualizar()">
                    <button class="botonPulsar latoPr">Actualizar</button>
                </div>
                <div class="contenedorBoton contenedorBotonDelgado" (click)="crear()">
                    <button class="botonPulsar latoPr">Crear</button>
                </div>
            }
        </div>
    </div>
</div>
