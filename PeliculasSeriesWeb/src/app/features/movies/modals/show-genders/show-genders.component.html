<div class="margen">
    <div class="contenedorDecoracion"></div>
    <div class="contenedor">
        <div class="cabecera">
            <div class="nombre letraGrande"><p>Géneros</p></div>
            <div class="decoracion">
                <span class="material-symbols-outlined icono">remove</span>
                <span class="material-symbols-outlined icono">select_window</span>
                <span class="material-symbols-outlined icono eliminar" (click)="cerrar()">close</span>
            </div>
        </div>

        <div class="cuerpo">
            <div class="generos">

                @if (generosService.genres().length === 0) {
                    <p class="sinGenero letraPequeña">No hay géneros creados todavía.</p>
                }

                @for (genero of generosService.genres(); track genero.nombre; let i = $index) {
                    <!-- El id debe ser único; usamos el índice para ello -->
                    <input
                        type="radio"
                        name="generoSeleccionado"
                        [id]="'genero-' + i"
                        [checked]="isSelected(genero.nombre)"
                        (change)="select(genero.nombre)"
                        hidden
                    />
                    <label
                        [for]="'genero-' + i"
                        class="contenedorGeneros"
                        [class.seleccionado]="isSelected(genero.nombre)">
                        {{ genero.nombre }}
                    </label>
                }

            </div>
        </div>

        <div class="pie">
            <div class="contenedorBoton" (click)="eliminar()">
                <button class="botonPulsar">Eliminar</button>
            </div>
            <div class="contenedorBoton contenedorBotonAncho" (click)="actualizar()">
                <button class="botonPulsar">Actualizar</button>
            </div>
            <div class="contenedorBoton contenedorBotonDelgado" (click)="crear()">
                <button class="botonPulsar">Crear</button>
            </div>
        </div>
    </div>
</div>
